# Cron keep-alive de Supabase (HANDOFFCES §5.2 C.2).
# El plan gratuito pausa proyectos tras ~1 semana sin tráfico; este select
# trivial cada 2 días lo mantiene activo. Requiere los secrets del repo:
#   SUPABASE_URL        (https://xxxx.supabase.co)
#   SUPABASE_ANON_KEY   (anon/publishable key — la pública, JAMÁS la service_role)
# Nota: GitHub desactiva schedules tras ~60 días sin actividad en el repo;
# un commit ocasional los reactiva (respaldo alterno: cron-job.org).
name: Supabase keep-alive
on:
  schedule:
    - cron: '17 6 */2 * *'   # cada 2 días, 06:17 UTC
  workflow_dispatch:           # permite dispararlo a mano para probarlo
jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: select trivial a keepalive
        run: |
          curl -sf "${{ secrets.SUPABASE_URL }}/rest/v1/keepalive?select=id&limit=1" \
            -H "apikey: ${{ secrets.SUPABASE_ANON_KEY }}" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_ANON_KEY }}"
