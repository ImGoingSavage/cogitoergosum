<!DOCTYPE html><html lang="es"><head><meta charset="UTF-8" />
<script>window.addEventListener('load', () => setTimeout(() => document.getElementById('nav-dashboard').click(), 1500));</script>
<title>t</title><link rel="stylesheet" href="css/styles.css" /></head><body><script>
fetch('index.html').then(r => r.text()).then(t => {
  const doc = new DOMParser().parseFromString(t, 'text/html');
  document.body.innerHTML = doc.body.innerHTML;
  const s = document.createElement('script'); s.type = 'module'; s.src = 'js/app.js';
  document.body.appendChild(s);
  setTimeout(() => document.dispatchEvent(new Event('DOMContentLoaded')), 400);
});
</script></body></html>
